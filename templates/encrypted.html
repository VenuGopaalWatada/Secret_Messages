{% extends 'base.html' %}

{% block head %}
<title>Secret Messages | Encrypted</title>
{% endblock %}

{% block body %}
<h2>Your message is Encrypted. You can copy the below message to share it securely.</h2>

<footer>
    <a href="{{ url_for('logout') }}"><button id="logout">Logout</button></a>
</footer>
{% endblock %}
